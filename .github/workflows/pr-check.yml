name: PR Check

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/pr-check.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.x

      - name: Run tests
        run: dotnet test tests/Cocodif.Tests/Cocodif.Tests.csproj /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:Include=[Cocodif]*

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./tests/Cocodif.Tests/coverage.opencover.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: cocodif
          fail_ci_if_error: true
