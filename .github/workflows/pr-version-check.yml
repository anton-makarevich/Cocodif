name: PR Version Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get version from current branch
        id: current-version
        run: |
          version=$(grep '<CocodifVersion>' src/Cocodif/Cocodif.csproj | sed 's/.*<CocodifVersion>\(.*\)<\/CocodifVersion>.*/\1/')
          echo "Current version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Get version from main branch
        id: main-version
        run: |
          version=$(git show origin/main:src/Cocodif/Cocodif.csproj | grep '<CocodifVersion>' | sed 's/.*<CocodifVersion>\(.*\)<\/CocodifVersion>.*/\1/')
          echo "Main version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Get version from action.yml
        id: action-version
        run: |
          version=$(awk '/cocodif-version:/{found=1} found && /default:/{print; exit}' action.yml | sed "s/.*default: '\(.*\)'/\1/")
          echo "action.yml version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        run: |
          current="${{ steps.current-version.outputs.version }}"
          main="${{ steps.main-version.outputs.version }}"
          action="${{ steps.action-version.outputs.version }}"
          echo "Current:      $current"
          echo "Main:         $main"
          echo "action.yml:   $action"
          if [ "$current" = "$main" ]; then
            echo "::error::CocodifVersion ($current) must be bumped before merging into main."
            exit 1
          fi
          if [ "$current" != "$action" ]; then
            echo "::error::CocodifVersion in Cocodif.csproj ($current) does not match default in action.yml ($action)."
            exit 1
          fi
          echo "All version checks passed."
